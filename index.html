<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happiness Journey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
padding:20px;
}

.container{
max-width:900px;
width:100%;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:20px;
font-weight:700;
}

.controls{
margin-bottom:20px;
}

select{
padding:10px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-top:20px;
}

.cell{
background:white;
color:#333;
padding:15px;
border-radius:12px;
font-weight:600;
cursor:pointer;
transition:all 0.2s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.cell:hover{
transform:scale(1.08);
background:#ffe082;
}

.result{
margin-top:25px;
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:12px;
font-size:18px;
min-height:60px;
}

.footer{
margin-top:10px;
font-size:13px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happiness Journey Game</h1>

<div class="controls">

<label>Select Your Genre</label>
<br><br>

<select id="genre">
<option value="fitness">💪 Fitness</option>
<option value="artist">🎨 Artist</option>
<option value="mind">🌿 Inner Peace</option>
<option value="social">Social ❤️ r</option>
</select>

</div>

<div class="grid" id="board"></div>

<div class="result" id="result">
Tap a board number to reveal your task!
</div>

<div class="footer">
Scan • Play • Spread Happiness ✨
</div>

</div>

<script>

const tasks={
fitness:[
"Do 15 jumping jacks.",
"Hold a plank for 20 seconds.",
"Do 10 squats while smiling.",
"Take 5 deep breaths and lead the group.",
"Share one healthy habit you want to build.",
"Do 10 pushups or knee pushups.",
"Teach one quick stretch.",
"Rate your energy level from 1-10."
],

artist:[
"Draw your current mood in 30 seconds.",
"Create a 4-line poem about happiness.",
"Act out an emotion silently.",
"Doodle something using only circles.",
"Create a motivational slogan.",
"Describe your dream life in 3 words.",
"Collaborate to make a quick story.",
"Share a moment creativity made you happy."
],

mind:[
"Share one thing you're grateful for.",
"Close eyes for 20 seconds and describe sounds.",
"Say a positive affirmation.",
"Share a challenge that made you stronger.",
"Compliment yourself genuinely.",
"Describe your ideal peaceful day.",
"Name one small win this week.",
"Forgive yourself for something small."
],

social:[
"Give a genuine compliment to a player.",
"Make the group laugh in 15 seconds.",
"Thank someone sincerely.",
"Ask another player a meaningful question.",
"Say something that would cheer someone up.",
"Share what friendship means to you.",
"Do a 10-second handshake with someone.",
"Share one way to spread kindness."
]
};

const specialCards=[
"⭐ Roll the dice again and move forward!",
"⭐ Choose a player. They must complete 2 tasks next turn.",
"⭐ You may skip your next task.",
"⭐ Everyone shares one gratitude moment.",
"⭐ Swap positions with another player.",
"⭐ Gain 2 Happiness Points!"
];

const board=document.getElementById("board");

for(let i=2;i<=49;i++){

const cell=document.createElement("div");

cell.className="cell";
cell.innerText=i;

cell.onclick=function(){
getTask(i);
};

board.appendChild(cell);
}

function getTask(position){

const genre=document.getElementById("genre").value;
const result=document.getElementById("result");

if(position%7===0){

const special=specialCards[Math.floor(Math.random()*specialCards.length)];
result.innerText=special;

}
else{

const genreTasks=tasks[genre];
const task=genreTasks[Math.floor(Math.random()*genreTasks.length)];
result.innerText=task;

}

}

</script>

</body>
</html>
