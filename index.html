<!DOCTYPE html>
<html>
<head>
  <title>Happiness Journey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f9f9;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    select {
      padding: 8px;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      max-width: 500px;
      margin: 20px auto;
    }

    .cell {
      padding: 15px;
      background: #ffffff;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #ddd;
      transition: 0.2s;
    }

    .cell:hover {
      background: #dff6f0;
      transform: scale(1.05);
    }

    #result {
      margin-top: 30px;
      font-size: 18px;
      font-weight: bold;
      color: #444;
      min-height: 50px;
    }
  </style>
</head>
<body>

  <h1>Happiness Journey 🎉</h1>

  <label>Select Your Genre:</label>
  <br><br>
  <select id="genre">
    <option value="fitness">Energy Builder 💪</option>
    <option value="artist">Creative Soul 🎨</option>
    <option value="mind">Inner Peace 🌿</option>
    <option value="social">Heart Connector ❤️</option>
  </select>

  <div class="grid" id="board"></div>

  <div id="result">Tap your board position to get a task!</div>

  <script>
    const tasks = {
      fitness: [
        "Do 15 jumping jacks.",
        "Hold a plank for 20 seconds.",
        "Do 10 squats while smiling.",
        "Take 5 deep breaths and lead the group.",
        "Share one healthy habit you want to build.",
        "Do 10 pushups (or knee pushups).",
        "Teach one quick stretch.",
        "Rate your energy level and explain why."
      ],
      artist: [
        "Draw your current mood in 30 seconds.",
        "Create a 4-line mini poem about happiness.",
        "Act out an emotion silently.",
        "Doodle something using only circles.",
        "Create a 10-second motivational slogan.",
        "Describe your dream life in 3 creative words.",
        "Collaborate on a quick story.",
        "Share a moment creativity made you happy."
      ],
      mind: [
        "Share one thing you're grateful for.",
        "Close eyes for 20 seconds and describe sounds.",
        "Say a positive affirmation.",
        "Share one challenge that made you stronger.",
        "Compliment yourself genuinely.",
        "Describe your ideal peaceful day.",
        "Name one small win this week.",
        "Forgive yourself for something small."
      ],
      social: [
        "Give a genuine compliment to a player.",
        "Make the group laugh in 15 seconds.",
        "Thank someone sincerely.",
        "Ask a meaningful question to a player.",
        "Say something that would cheer someone up.",
        "Share what friendship means to you.",
        "Do a 10-second handshake with someone.",
        "Share one way to spread kindness."
      ]
    };

    const specialCards = [
      "⭐ Roll again and move forward!",
      "⭐ Choose a player. They must complete 2 tasks next turn.",
      "⭐ You may skip your next task.",
      "⭐ Everyone shares one gratitude moment.",
      "⭐ Swap positions with another player.",
      "⭐ Gain 2 Happiness Points!"
    ];

    const board = document.getElementById("board");

    // Create grid 2–49
    for (let i = 2; i <= 49; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.innerText = i;

      cell.onclick = function() {
        getTask(i);
      };

      board.appendChild(cell);
    }

    function getTask(position) {
      const genre = document.getElementById("genre").value;
      const result = document.getElementById("result");

      // Example logic: multiples of 7 = special card
      if (position % 7 === 0) {
        const randomSpecial = specialCards[Math.floor(Math.random() * specialCards.length)];
        result.innerText = randomSpecial;
      } else {
        const genreTasks = tasks[genre];
        const randomTask = genreTasks[Math.floor(Math.random() * genreTasks.length)];
        result.innerText = randomTask;
      }
    }
  </script>

</body>
</html>
