<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happiness Journey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins}

body{
background:linear-gradient(135deg,#5c8cff,#7c4dff);
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
color:white;
}

.container{
width:100%;
max-width:1000px;
text-align:center;
}

.setup{margin-bottom:20px}

input,select{
padding:8px;
margin:5px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#ffd54f;
font-weight:bold;
cursor:pointer;
}

.turn{
margin-top:10px;
font-weight:bold;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

.playerToken{
width:16px;
height:16px;
border-radius:50%;
display:inline-block;
}

.scene{
width:60px;
height:60px;
margin:15px auto;
perspective:600px;
}

.cube{
width:60px;
height:60px;
position:relative;
transform-style:preserve-3d;
transition:transform 1s;
}

.face{
position:absolute;
width:60px;
height:60px;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
font-size:22px;
}

.front{transform:rotateY(0deg) translateZ(30px)}
.back{transform:rotateY(180deg) translateZ(30px)}
.right{transform:rotateY(90deg) translateZ(30px)}
.left{transform:rotateY(-90deg) translateZ(30px)}
.top{transform:rotateX(90deg) translateZ(30px)}
.bottom{transform:rotateX(-90deg) translateZ(30px)}

.bounce{animation:bounce .6s}

@keyframes bounce{
0%{transform:translateY(0)}
40%{transform:translateY(-25px)}
70%{transform:translateY(10px)}
100%{transform:translateY(0)}
}

.board{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-top:20px;
}

.cell{
background:white;
color:#333;
height:70px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
position:relative;
}

.start{background:#81c784}
.end{background:#ff8a65}

.tokenContainer{
position:absolute;
bottom:4px;
left:4px;
right:4px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:2px;
}

.token{
width:12px;
height:12px;
border-radius:50%;
margin:auto;
animation:jump .25s;
}

@keyframes jump{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
}

.popupContent{
background:white;
color:black;
padding:25px;
border-radius:15px;
width:80%;
max-width:400px;
}

.popupButtons{
margin-top:15px;
display:flex;
gap:10px;
justify-content:center;
}

.leaderboard{
margin-top:20px;
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:12px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎉 Happiness Journey</h1>

<div class="setup">

<label>Number of Players</label> <select id="playerCount" onchange="updateInputs()">

<option value="">Select</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>

<div id="playerInputs"></div>

<button onclick="startGame()">Start Game</button>

</div>

<div id="gameArea" style="display:none">

<div id="turnText" class="turn"></div>

<div class="scene">
<div class="cube" id="cube">
<div class="face front">1</div>
<div class="face back">6</div>
<div class="face right">3</div>
<div class="face left">4</div>
<div class="face top">5</div>
<div class="face bottom">2</div>
</div>
</div>

<button onclick="rollDice()">Roll Dice</button>

<div id="board" class="board"></div>

<div class="leaderboard">
<h3>🏆 Happiness Leaderboard</h3>
<div id="leaderboard"></div>
</div>

</div>

</div>

<div class="popup" id="popup">
<div class="popupContent">
<h3>Task</h3>
<p id="taskText"></p>

<div class="popupButtons">
<button onclick="taskCompleted()">Completed</button>
<button onclick="taskSkipped()">Not Completed</button>
</div>

</div>
</div>

<script>

const tasks={
fitness:[
"Do 10 pushups",
"Hold plank for 30 seconds",
"Do 20 jumping jacks",
"Share one workout tip that helped you",
"Name 2 foods rich in protein",
"Share a fitness habit you recommend",
"Do 15 squats",
"Take 5 deep breaths and stretch"
],

artist:[
"Draw your current mood",
"Create a 3-line story",
"Sketch something using only circles",
"Act an emotion silently",
"Name a song that inspires creativity",
"Create a 4 word motivational slogan",
"Describe dream life in 3 words",
"Draw an emoji representing yourself"
],

mind:[
"Share something you're grateful for",
"Say one positive affirmation",
"Close eyes for 20 seconds",
"Share a recent peaceful moment",
"Name something you appreciate about yourself",
"Take 3 slow deep breaths",
"Describe your ideal peaceful day",
"Share one small win this week"
],

social:[
"Give someone a genuine compliment",
"Ask someone a meaningful question",
"Tell a short joke",
"Share a kindness idea",
"Thank someone in the room",
"Name a quality you admire in friends",
"Make everyone laugh in 15 seconds",
"Share a memorable moment with friends"
]
}

let players=[]
let genres=[]
let positions=[]
let scores=[]
let colors=["red","blue","green","yellow"]
let currentPlayer=0

function updateInputs(){

let count=document.getElementById("playerCount").value
let container=document.getElementById("playerInputs")
container.innerHTML=""

for(let i=1;i<=count;i++){

container.innerHTML+=`
<div>
<input id="p${i}" placeholder="Player ${i}">
<select id="g${i}">
<option value="fitness">Fitness</option>
<option value="artist">Artist</option>
<option value="mind">Mindfulness</option>
<option value="social">Social</option>
</select>
</div>
`

}

}

function startGame(){

let count=document.getElementById("playerCount").value

for(let i=1;i<=count;i++){
players.push(document.getElementById("p"+i).value)
genres.push(document.getElementById("g"+i).value)
positions.push(0)
scores.push(0)
}

document.querySelector(".setup").style.display="none"
document.getElementById("gameArea").style.display="block"

createBoard()
updateTurn()
updateLeaderboard()

}

function createBoard(){

let board=document.getElementById("board")

for(let i=0;i<=50;i++){

let label=i
if(i==0) label="START"
if(i==50) label="END"

let cell=document.createElement("div")
cell.className="cell"

if(i==0) cell.classList.add("start")
if(i==50) cell.classList.add("end")

cell.innerHTML=label+`<div class="tokenContainer" id="tokens${i}"></div>`

board.appendChild(cell)

}

renderTokens()

}

function renderTokens(){

players.forEach((p,i)=>{

let token=document.createElement("div")
token.className="token"
token.style.background=colors[i]

document.getElementById("tokens"+positions[i]).appendChild(token)

})

}

function rollDice(){

let cube=document.getElementById("cube")
let roll=Math.floor(Math.random()*6)+1

let rotations={
1:"rotateX(0deg)",
2:"rotateX(-90deg)",
3:"rotateY(90deg)",
4:"rotateY(-90deg)",
5:"rotateX(90deg)",
6:"rotateY(180deg)"
}

cube.style.transform=rotations[roll]
cube.classList.add("bounce")

setTimeout(()=>{
cube.classList.remove("bounce")
movePlayer(roll)
},600)

}

function movePlayer(steps){

let interval=setInterval(()=>{

positions[currentPlayer]++

if(positions[currentPlayer]>50) positions[currentPlayer]=50

updateBoard()

steps--

if(steps==0){

clearInterval(interval)
checkSpecial()

}

},250)

}

function checkSpecial(){

if(positions[currentPlayer]!==0 && positions[currentPlayer] % 7 ===0){

let roll=Math.floor(Math.random()*6)+1
alert("⭐ Special Tile! Move backwards "+roll)

positions[currentPlayer]-=roll
if(positions[currentPlayer]<0) positions[currentPlayer]=0

updateBoard()

}

showTask()

}

function updateBoard(){

document.querySelectorAll(".token").forEach(t=>t.remove())
renderTokens()

}

function showTask(){

let genre=genres[currentPlayer]
let list=tasks[genre]

let task=list[Math.floor(Math.random()*list.length)]

document.getElementById("taskText").innerText=task
document.getElementById("popup").style.visibility="visible"

}

function taskCompleted(){

scores[currentPlayer]++
finishTurn()

}

function taskSkipped(){

finishTurn()

}

function finishTurn(){

document.getElementById("popup").style.visibility="hidden"

updateLeaderboard()

if(positions[currentPlayer]>=50){
alert(players[currentPlayer]+" reached END! 🎉")
}

currentPlayer=(currentPlayer+1)%players.length
updateTurn()

}

function updateTurn(){

let color=colors[currentPlayer]

document.getElementById("turnText").innerHTML=
`<span class="playerToken" style="background:${color}"></span>
Turn: ${players[currentPlayer]} (${genres[currentPlayer]})`

}

function updateLeaderboard(){

let board=document.getElementById("leaderboard")

let data=players.map((p,i)=>({name:p,score:scores[i]}))
data.sort((a,b)=>b.score-a.score)

board.innerHTML=""

data.forEach((p,i)=>{
board.innerHTML+=`${i+1}. ${p.name} — ${p.score} pts<br>`
})

}

</script>

</body>
</html>
